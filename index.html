<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Dashboard v2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --sidebar-width: 280px; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; color: #1c1e21; }
        #sidebar { width: var(--sidebar-width); position: fixed; height: 100vh; background: #1a202c; color: white; padding: 25px; z-index: 1000; }
        #main-content { margin-left: var(--sidebar-width); padding: 40px; position: relative; }
        .chart-box { 
            position: absolute; top: 40px; right: 40px; 
            width: 160px; height: 160px; background: white; 
            padding: 15px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .card { border: none; border-radius: 15px; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-3px); }
        .bg-grad-1 { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .bg-grad-2 { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .bg-grad-3 { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .table { background: white; border-radius: 15px; overflow: hidden; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        @media (max-width: 992px) {
            #sidebar { width: 100%; height: auto; position: relative; }
            #main-content { margin-left: 0; }
            .chart-box { position: relative; top: 0; right: 0; margin: 0 auto 20px; }
        }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="spinner-border text-primary"></div>
    <div class="mt-2 fw-bold">กำลังซิงค์ข้อมูลจาก Google Sheets...</div>
</div>

<div id="sidebar">
    <h4 class="mb-4 fw-bold">Invoice Manager</h4>
    <div class="mb-3">
        <label class="small opacity-75 mb-1">ค้นหาชื่อลูกค้า</label>
        <select id="nameFilter" class="form-select bg-dark text-white border-0" onchange="processData()"></select>
    </div>
    <div class="mb-3">
        <label class="small opacity-75 mb-1">กรองตามเดือน</label>
        <select id="monthFilter" class="form-select bg-dark text-white border-0" onchange="processData()"></select>
    </div>
    <div class="mb-3">
        <label class="small opacity-75 mb-1">สถานะ</label>
        <select id="statusFilter" class="form-select bg-dark text-white border-0" onchange="processData()">
            <option value="">ทั้งหมด</option>
            <option value="Y">ชำระแล้ว</option>
            <option value="N">ค้างชำระ</option>
        </select>
    </div>
    <hr class="opacity-25">
    <button class="btn btn-primary w-100 mb-2" onclick="loadData()">🔄 รีเฟรชข้อมูล</button>
    <button class="btn btn-outline-light w-100" onclick="exportPDF()">📄 ออกรายงาน PDF</button>
</div>

<div id="main-content">
    <div id="report-area">
        <div class="chart-box"><canvas id="miniChart"></canvas></div>
        
        <h2 class="fw-bold">Financial Summary</h2>
        <p class="text-muted mb-4">รายงานสรุปสถานะลูกหนี้รายวัน</p>

        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="card p-4 bg-grad-1">
                    <div class="small opacity-75">ยอดรวมทั้งหมด</div>
                    <h3 id="countTotal" class="mb-0 fw-bold">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-4 bg-grad-2">
                    <div class="small opacity-75">ชำระแล้ว</div>
                    <h3 id="countPaid" class="mb-0 fw-bold">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-4 bg-grad-3">
                    <div class="small opacity-75">ค้างชำระ</div>
                    <h3 id="countPending" class="mb-0 fw-bold">0</h3>
                </div>
            </div>
        </div>

        <div class="card p-0 shadow-sm overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">INV No.</th>
                            <th>รายละเอียดลูกค้า</th>
                            <th>วันที่ออก</th>
                            <th class="text-end">ยอดสุทธิ</th>
                            <th class="text-center">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwXwzG4ZHjJbkx8PI845avK8aQOMOMT-63WPnWmOY9koXy2nqWOjr7JfnnbZ-OPo5c/exec";
    let rawData = [];
    let myChart = null;

    async function loadData() {
        document.getElementById("loader").style.display = "flex";
        try {
            const res = await fetch(API_URL);
            rawData = await res.json();
            setupFilters();
            processData();
        } catch(err) { console.error(err); alert("Failed to fetch data!"); }
        document.getElementById("loader").style.display = "none";
    }

    function setupFilters() {
        const names = [...new Set(rawData.map(r => r["ชื่อลูกค้า"]))].sort();
        // จัดการเรื่องเดือน (แสดงผลสวยๆ)
        const months = [...new Set(rawData.map(r => r["เดือน"]))].sort().reverse();

        document.getElementById("nameFilter").innerHTML = '<option value="">ทั้งหมด</option>' + 
            names.map(n => `<option>${n}</option>`).join('');
        document.getElementById("monthFilter").innerHTML = '<option value="">ทั้งหมด</option>' + 
            months.map(m => `<option>${m}</option>`).join('');
    }

    function processData() {
        const name = document.getElementById("nameFilter").value;
        const month = document.getElementById("monthFilter").value;
        const status = document.getElementById("statusFilter").value;

        const filtered = rawData.filter(r => {
            const mName = !name || r["ชื่อลูกค้า"] === name;
            const mMonth = !month || r["เดือน"] === month;
            let mStatus = true;
            if(status==="Y") mStatus = r["สถานะ"]==="Y";
            if(status==="N") mStatus = r["สถานะ"]!=="Y";
            return mName && mMonth && mStatus;
        });

        renderTable(filtered);
        updateSummary(filtered);
    }

    function parseNum(v) { return parseFloat(String(v).replace(/,/g,""))||0; }

    function renderTable(data) {
        let html = "";
        data.forEach(r => {
            const total = parseNum(r["รวมทั้งสิ้น"]);
            const isPaid = r["สถานะ"]==="Y";
            html += `<tr>
                <td class="ps-4 fw-bold text-primary">${r["INVOICE"]||"-"}</td>
                <td><div>${r["ชื่อลูกค้า"]}</div><small class="text-muted">${r["เดือน"]}</small></td>
                <td>${r["วันที่"]}</td>
                <td class="text-end fw-bold">${total.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                <td class="text-center"><span class="badge ${isPaid?"bg-success":"bg-warning text-dark"} rounded-pill">${isPaid?"ชำระแล้ว":"ค้างชำระ"}</span></td>
            </tr>`;
        });
        document.getElementById("tableBody").innerHTML = html || '<tr><td colspan="5" class="text-center py-5">ไม่มีข้อมูลที่ตรงตามเงื่อนไข</td></tr>';
    }

    function updateSummary(data) {
        const total = data.reduce((s,r)=>s+parseNum(r["รวมทั้งสิ้น"]),0);
        const paid = data.filter(r=>r["สถานะ"]==="Y").reduce((s,r)=>s+parseNum(r["รวมทั้งสิ้น"]),0);
        const pending = total - paid;

        document.getElementById("countTotal").innerText = total.toLocaleString();
        document.getElementById("countPaid").innerText = paid.toLocaleString();
        document.getElementById("countPending").innerText = pending.toLocaleString();

        updateChart(paid, pending);
    }

    function updateChart(paid, pending) {
        const ctx = document.getElementById('miniChart').getContext('2d');
        if (myChart) myChart.destroy();
        if (paid === 0 && pending === 0) return; // ไม่วาดถ้าไม่มีข้อมูล

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [paid, pending],
                    backgroundColor: ['#10b981', '#f59e0b'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '75%', plugins: { legend: { display: false } } }
        });
    }

    function exportPDF() {
        const element = document.getElementById("report-area");
        html2pdf().from(element).set({
            margin: 10, filename: 'Report.pdf',
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        }).save();
    }

    window.onload = loadData;
</script>
</body>
</html>
