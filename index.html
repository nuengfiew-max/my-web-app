<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Dashboard Pro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root { --sidebar-width: 260px; }
body { font-family: 'Segoe UI', sans-serif; background:#f3f4f6; }

#sidebar {
  width: var(--sidebar-width);
  position: fixed;
  height: 100vh;
  background: linear-gradient(180deg,#111827,#1f2937);
  color:white;
  padding:20px;
}

#main {
  margin-left: var(--sidebar-width);
  padding:25px;
}

.card {
  border-radius:20px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.table tbody tr:hover { background:#f1f5f9; }

.badge { font-size:12px; }

.loader {
 position:fixed; inset:0;
 display:flex; justify-content:center; align-items:center;
 background:rgba(255,255,255,0.8);
 z-index:9999;
}

</style>
</head>

<body>

<div id="loader" class="loader">
  <div class="spinner-border"></div>
</div>

<div id="sidebar">
  <h4>Invoice Pro</h4>

  <input id="search" class="form-control mb-2" placeholder="Search..." onkeyup="process()">

  <select id="name" class="form-select mb-2" onchange="process()"></select>
  <select id="month" class="form-select mb-2" onchange="process()"></select>

  <select id="status" class="form-select mb-3" onchange="process()">
    <option value="">All</option>
    <option value="Y">Paid</option>
    <option value="N">Pending</option>
  </select>

  <button class="btn btn-primary w-100 mb-2" onclick="load()">Refresh</button>
  <button class="btn btn-success w-100 mb-2" onclick="exportCSV()">Export CSV</button>
  <button class="btn btn-light w-100" onclick="exportPDF()">Export PDF</button>
</div>

<div id="main">

<h3>Dashboard</h3>

<div class="row mb-4">
  <div class="col-md-3"><div class="card p-3">Total<br><b id="total">0</b></div></div>
  <div class="col-md-3"><div class="card p-3">Paid<br><b id="paid">0</b></div></div>
  <div class="col-md-3"><div class="card p-3">Pending<br><b id="pending">0</b></div></div>
  <div class="col-md-3"><div class="card p-3">% Paid<br><b id="percent">0%</b></div></div>
</div>

<div class="row mb-4">
  <div class="col-md-6"><canvas id="donut"></canvas></div>
  <div class="col-md-6"><canvas id="bar"></canvas></div>
</div>

<div class="card p-3">
<table class="table">
<thead>
<tr>
<th>INV</th><th>Customer</th><th>Date</th><th class="text-end">Amount</th><th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwXwzG4ZHjJbkx8PI845avK8aQOMOMT-63WPnWmOY9koXy2nqWOjr7JfnnbZ-OPo5c/exec";
let data = [];
let donutChart, barChart;

function num(v){return parseFloat(String(v).replace(/,/g,""))||0}

async function load(){
 document.getElementById('loader').style.display='flex';
 const res = await fetch(API);
 data = await res.json();
 setup();
 process();
 document.getElementById('loader').style.display='none';
}

function setup(){
 const names=[...new Set(data.map(x=>x['ชื่อลูกค้า']))];
 const months=[...new Set(data.map(x=>x['เดือน']))];
 
 document.getElementById('name').innerHTML='<option value="">All</option>'+names.map(n=>`<option>${n}</option>`);
 document.getElementById('month').innerHTML='<option value="">All</option>'+months.map(m=>`<option>${m}</option>`);
}

function process(){
 const s=document.getElementById('search').value.toLowerCase();
 const name=document.getElementById('name').value;
 const month=document.getElementById('month').value;
 const status=document.getElementById('status').value;

 const filtered=data.filter(r=>{
  const txt=(r['INVOICE']+r['ชื่อลูกค้า']).toLowerCase();
  return (!s||txt.includes(s)) && (!name||r['ชื่อลูกค้า']==name) && (!month||r['เดือน']==month) && (!status||(status=='Y'?r['สถานะ']=='Y':r['สถานะ']!='Y'));
 });

 render(filtered);
 summary(filtered);
}

function render(d){
 let html='';
 d.forEach(r=>{
  const amount=num(r['รวมทั้งสิ้น']);
  const paid=r['สถานะ']=='Y';
  html+=`<tr class="${!paid?'table-danger':''}">
  <td>${r['INVOICE']}</td>
  <td>${r['ชื่อลูกค้า']}</td>
  <td>${r['วันที่']}</td>
  <td class="text-end">${amount.toLocaleString()}</td>
  <td><span class="badge ${paid?'bg-success':'bg-warning'}">${paid?'Paid':'Pending'}</span></td>
  </tr>`;
 });
 document.getElementById('tbody').innerHTML=html;
}

function summary(d){
 const total=d.reduce((s,r)=>s+num(r['รวมทั้งสิ้น']),0);
 const paid=d.filter(r=>r['สถานะ']=='Y').reduce((s,r)=>s+num(r['รวมทั้งสิ้น']),0);
 const pending=total-paid;

 document.getElementById('total').innerText=total.toLocaleString();
 document.getElementById('paid').innerText=paid.toLocaleString();
 document.getElementById('pending').innerText=pending.toLocaleString();
 document.getElementById('percent').innerText=(total?((paid/total)*100).toFixed(1):0)+'%';

 drawCharts(d,paid,pending);
}

function drawCharts(d,paid,pending){
 if(donutChart) donutChart.destroy();
 donutChart=new Chart(document.getElementById('donut'),{
  type:'doughnut',
  data:{datasets:[{data:[paid,pending]}]}
 });

 const group={};
 d.forEach(r=>{
  const m=r['เดือน'];
  group[m]=(group[m]||0)+num(r['รวมทั้งสิ้น']);
 });

 if(barChart) barChart.destroy();
 barChart=new Chart(document.getElementById('bar'),{
  type:'bar',
  data:{labels:Object.keys(group),datasets:[{data:Object.values(group)}]}
 });
}

function exportCSV(){
 const csv=data.map(r=>Object.values(r).join(',')).join('\n');
 const blob=new Blob([csv]);
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='data.csv';
 a.click();
}

function exportPDF(){
 html2pdf().from(document.body).save();
}

window.onload=load;
</script>

</body>
</html>
